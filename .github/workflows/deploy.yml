name: Build, publish and deploy to MonsterASP.NET

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0

      - name: Restore
        run: dotnet restore SariKartAPI.NET6.csproj

      - name: Build
        run: dotnet build SariKartAPI.NET6.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish SariKartAPI.NET6.csproj --configuration Release --output ./publish --runtime win-x64 --self-contained true

      - name: Enable stdout logging
        run: |
          $cfg = "./publish/web.config"
          (Get-Content $cfg) `
            -replace 'stdoutLogEnabled="false"', 'stdoutLogEnabled="true"' `
            | Set-Content $cfg
          New-Item -ItemType Directory -Force -Path "./publish/logs" | Out-Null

      - name: Deploy to MonsterASP.NET via WebDeploy
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: ${{ secrets.WEBSITE_NAME }}
          server-computer-name: ${{ secrets.SERVER_COMPUTER_NAME }}
          server-username: ${{ secrets.SERVER_USERNAME }}
          server-password: ${{ secrets.SERVER_PASSWORD }}
